<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Avalon Resource Hub</title>
    <script>
      // GitHub Pages SPA redirect — preserves the path so wouter routing works.
      // When GitHub Pages 404s on /staff, this page redirects to /?/staff
      // and index.html restores it via history.replaceState.
      (function () {
        var l = window.location;
        var base = l.pathname.split("/").slice(0, 2).join("/");
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            base +
            "/?/" +
            l.pathname.slice(base.length + 1).replace(/&/g, "~and~") +
            (l.search
              ? "&" + l.search.slice(1).replace(/&/g, "~and~")
              : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
