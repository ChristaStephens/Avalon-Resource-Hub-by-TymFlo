name: Deploy Avalon Resource Hub to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "artifacts/avalon-resource-hub/**"
      - "artifacts/avalon-walkthrough-video/**"
      - ".github/workflows/deploy-avalon.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # Skip the minimum release age check in CI (packages are from lockfile)
          NPM_CONFIG_MINIMUM_RELEASE_AGE: 0

      - name: Build
        run: pnpm --filter @workspace/avalon-resource-hub run build:gh-pages
        env:
          VITE_AIRTABLE_PAT: ${{ secrets.VITE_AIRTABLE_PAT }}
          VITE_AIRTABLE_BASE_ID: ${{ vars.VITE_AIRTABLE_BASE_ID }}
          VITE_AIRTABLE_TABLE_ID: ${{ vars.VITE_AIRTABLE_TABLE_ID }}
          VITE_STAFF_PASSWORD_HASH: ${{ secrets.VITE_STAFF_PASSWORD_HASH }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/avalon-resource-hub/dist/public

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
